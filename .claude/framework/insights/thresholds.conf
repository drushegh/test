# thresholds.conf — tunable thresholds for framework efficacy analysis.
# Shell-sourceable KEY=VALUE. Comments start with #.
# Read by .claude/framework/insights/analyse.sh.
#
# Every threshold maps to one concern in framework-metrics.md. Override
# per-project if your workflow differs (e.g., a fast-moving repo might
# accept a higher drift-guard fire rate than the default).

# --- Throttling ------------------------------------------------------
# How many days between automatic analyses (cold-start trigger).
# 0 = run every cold start (noisy). 7 = weekly. Recommended: 7.
INSIGHTS_CHECK_INTERVAL_DAYS=7

# Minimum events collected before an analysis runs at all. Small sample
# sizes produce false alarms.
INSIGHTS_MIN_EVENTS=50

# --- Drift Guard -----------------------------------------------------
# If > this fraction of UserPromptSubmit events triggered a drift
# reminder, the framework rules are probably too weak — consider
# promoting a rule to a hook, skill, or stricter CLAUDE.md wording.
DRIFT_GUARD_FIRE_RATE_HIGH=0.30

# If fire rate is below this AND we have at least INSIGHTS_MIN_EVENTS,
# the guard may be redundant — consider retiring or simplifying.
DRIFT_GUARD_FIRE_RATE_LOW=0.02

# --- Stop Hook (enforce-state-update) --------------------------------
# Fraction of session ends blocked for missing state file updates.
# High = agents aren't doing their state updates; investigate why.
STOP_HOOK_BLOCK_RATE_HIGH=0.20

# --- Block-Dangerous-Commands ----------------------------------------
# If > this fraction of bash invocations are blocked, agents are
# routinely trying dangerous patterns — worth strengthening CLAUDE.md
# guidance or adding safer alternatives.
DANGEROUS_CMD_BLOCK_RATE_HIGH=0.05

# --- Auto-Format / Auto-Lint -----------------------------------------
# If these hooks never run, they may be mis-wired. Flag as low only
# after INSIGHTS_MIN_EVENTS events total have been collected.
FORMAT_LINT_FIRE_RATE_LOW=0.01

# --- Session structure (schema v2, TASK-021) -------------------------
# Minimum distinct sessions (v2 events carry session_id) before any
# per-session finding fires. Per-session rates over a handful of
# sessions are noise.
INSIGHTS_MIN_SESSIONS=5

# Fraction of sessions that ended with at least one stop-hook block.
# The event-level STOP_HOOK_BLOCK_RATE_HIGH can be diluted by long
# sessions with many clean stops; this one answers "how often does a
# SESSION hit the state-file wall at all" — concentration, not volume.
STOP_BLOCK_SESSION_RATE_HIGH=0.50

# --- Review Findings (future — reads .claude/review-findings.md) -----
# Act rate = (findings acted on) / (total findings). Low = reviews
# are producing too many false positives or the team dismisses them.
#
# NOTE: not yet wired into analyse.sh. Kept commented-out to make that
# obvious — uncomment AND add the implementation in analyse.sh together.
# REVIEW_ACT_RATE_LOW=0.50
